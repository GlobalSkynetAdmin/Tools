<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Alex's Program</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0C0C0C;
    --surface:  #141414;
    --card:     #1A1A1A;
    --border:   #262626;
    --border2:  #333;
    --chalk:    #E8E4DC;
    --mid:      #888;
    --ghost:    #555;
    --rule:     #1E1E1E;
    --fire:     #E85D20;
    --fire-lt:  #F08050;
    --steel:    #4A7AAA;
    --steel-lt: #6A9ACA;
    --gold:     #C89040;
    --gold-lt:  #E0B060;
    --green:    #4A8A5A;
    --green-lt: #6AAA7A;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background-image: repeating-linear-gradient(
      -45deg, transparent, transparent 40px,
      rgba(255,255,255,.006) 40px, rgba(255,255,255,.006) 41px
    );
    pointer-events:none; z-index:0;
  }
  * { position:relative; z-index:1; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 1.25rem 1.25rem;
    position: relative; overflow: hidden;
  }

  header::after {
    content:'AP';
    position:absolute; right:-.5rem; top:50%;
    transform:translateY(-50%);
    font-family:'Barlow Condensed',sans-serif;
    font-size:9rem; font-weight:800;
    color:var(--fire); opacity:.04;
    line-height:1; pointer-events:none;
  }

  .header-kicker {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.7rem; letter-spacing:.3em;
    text-transform:uppercase; color:var(--fire);
    margin-bottom:.5rem;
  }

  h1 {
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(2.2rem,7vw,3.5rem);
    font-weight:800; line-height:.92;
    letter-spacing:-.01em; text-transform:uppercase;
  }

  .h1-sub {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.72rem; letter-spacing:.2em;
    text-transform:uppercase; color:var(--ghost);
    margin-top:.4rem; display:block;
  }

  .header-stats {
    display:flex; gap:.5rem; margin-top:.9rem; flex-wrap:wrap;
  }

  .hstat {
    background:var(--card); border:1px solid var(--border);
    border-radius:4px; padding:.3rem .7rem;
    font-family:'Barlow Condensed',sans-serif;
    font-size:.7rem; letter-spacing:.08em;
    text-transform:uppercase; color:var(--mid);
  }
  .hstat strong { color:var(--chalk); }

  /* PROTEIN BAR */
  .protein-wrap {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:.6rem 1.25rem;
  }

  .protein-top {
    display:flex; align-items:center;
    justify-content:space-between; gap:.75rem;
    margin-bottom:.35rem;
  }

  .protein-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.62rem; letter-spacing:.15em;
    text-transform:uppercase; color:var(--ghost);
  }

  .protein-val {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.88rem; font-weight:700; color:var(--steel-lt);
  }

  .protein-track {
    background:var(--border); border-radius:20px;
    height:5px; overflow:hidden; margin-bottom:.45rem;
  }

  .protein-fill {
    height:100%; border-radius:20px;
    background:linear-gradient(90deg,var(--steel),var(--steel-lt));
    transition:width .3s ease; min-width:0;
  }

  .protein-input-row { display:flex; gap:.4rem; }

  .p-input {
    flex:1; background:var(--card);
    border:1px solid var(--border); border-radius:5px;
    color:var(--chalk); font-family:'Barlow',sans-serif;
    font-size:.82rem; padding:.4rem .65rem;
    outline:none; -webkit-appearance:none;
    transition:border-color .15s;
  }
  .p-input:focus { border-color:var(--steel); }
  .p-input::placeholder { color:var(--ghost); font-size:.75rem; }

  .p-btn {
    background:var(--steel); border:none; border-radius:5px;
    color:white; font-family:'Barlow Condensed',sans-serif;
    font-size:.82rem; font-weight:600; letter-spacing:.06em;
    padding:.4rem .9rem; cursor:pointer; transition:all .15s;
    white-space:nowrap;
  }
  .p-btn:active { background:var(--steel-lt); }

  .p-reset {
    background:none; border:1px solid var(--border);
    border-radius:5px; color:var(--ghost);
    font-family:'Barlow Condensed',sans-serif;
    font-size:.72rem; letter-spacing:.06em;
    padding:.4rem .6rem; cursor:pointer; transition:all .15s;
  }
  .p-reset:active { color:var(--fire); border-color:var(--fire); }

  /* PHASE TABS */
  .phase-tabs {
    display:flex; background:var(--surface);
    border-bottom:1px solid var(--border);
    overflow-x:auto; scrollbar-width:none;
  }
  .phase-tabs::-webkit-scrollbar { display:none; }

  .phase-tab {
    flex:1; min-width:72px; background:none; border:none;
    border-bottom:2px solid transparent;
    padding:.75rem .4rem; cursor:pointer;
    text-align:center; transition:all .15s;
  }

  .pt-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.7rem; font-weight:600;
    letter-spacing:.06em; text-transform:uppercase;
    color:var(--ghost); display:block;
  }

  .pt-sub {
    font-size:.56rem; color:var(--ghost);
    display:block; margin-top:.08rem;
  }

  .phase-tab.active .pt-label { color:var(--fire); }
  .phase-tab.active { border-bottom-color:var(--fire); }
  .phase-tab.active .pt-sub { color:var(--mid); }
  .phase-tab.complete .pt-label { color:var(--green-lt); }
  .phase-tab.complete { border-bottom-color:var(--green); }

  /* PANELS */
  .panel { display:none; animation:fadeUp .2s ease; }
  .panel.active { display:block; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* PHASE INTRO CARD */
  .phase-intro {
    background:var(--card);
    border-bottom:1px solid var(--border);
    padding:1rem 1.25rem;
  }

  .pi-header {
    display:flex; align-items:flex-start;
    justify-content:space-between; gap:.75rem;
    margin-bottom:.5rem;
  }

  .pi-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:1.25rem; font-weight:700;
    text-transform:uppercase; letter-spacing:.03em; line-height:1;
  }

  .pi-weeks {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.65rem; letter-spacing:.12em;
    text-transform:uppercase; color:var(--fire);
    border:1px solid var(--fire); padding:.2rem .5rem;
    border-radius:3px; white-space:nowrap; flex-shrink:0;
  }

  .pi-desc {
    font-size:.76rem; color:var(--mid); line-height:1.65;
  }

  .pi-goal {
    font-size:.72rem; color:var(--gold-lt);
    font-style:italic; margin-top:.5rem;
    padding-top:.5rem; border-top:1px solid var(--rule);
  }

  /* MAIN AREA */
  .main { padding:.75rem; padding-bottom:5.5rem; }

  /* WEEK LABEL */
  .wk-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.62rem; letter-spacing:.2em;
    text-transform:uppercase; color:var(--ghost);
    margin:.85rem 0 .5rem;
    display:flex; align-items:center; gap:.6rem;
  }
  .wk-label:first-child { margin-top:0; }
  .wk-label::after { content:''; flex:1; height:1px; background:var(--rule); }

  /* DAY SCROLL */
  .day-scroll {
    display:flex; gap:.35rem; overflow-x:auto;
    padding-bottom:.35rem; margin-bottom:.65rem;
    scrollbar-width:none;
  }
  .day-scroll::-webkit-scrollbar { display:none; }

  .day-btn {
    flex-shrink:0; min-width:54px;
    background:var(--card); border:1.5px solid var(--border);
    border-radius:8px; padding:.45rem .5rem;
    cursor:pointer; text-align:center;
    transition:all .12s; user-select:none;
  }
  .day-btn:active { transform:scale(.93); }
  .day-btn.active  { border-color:var(--fire); background:rgba(232,93,32,.1); }
  .day-btn.done    { border-color:var(--green); background:rgba(74,138,90,.08); }
  .day-btn.rest-day { opacity:.5; cursor:default; }

  .db-name { font-family:'Barlow Condensed',sans-serif; font-size:.65rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--ghost); display:block; }
  .db-type { font-size:.55rem; color:var(--ghost); display:block; margin-top:.08rem; line-height:1.2; }
  .db-tick { font-size:.58rem; color:var(--green-lt); display:block; margin-top:.12rem; }

  .day-btn.active .db-name { color:var(--fire); }
  .day-btn.done   .db-name { color:var(--green-lt); }

  /* DAY VIEWS */
  .day-view { display:none; animation:fadeUp .15s ease; }
  .day-view.active { display:block; }

  /* SESSION HEADER */
  .session-hdr {
    background:var(--card); border:1px solid var(--border);
    border-radius:8px; padding:.8rem 1rem;
    margin-bottom:.6rem;
    display:flex; align-items:center;
    justify-content:space-between; gap:.75rem;
  }

  .sh-badge {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.6rem; letter-spacing:.15em;
    text-transform:uppercase; margin-bottom:.18rem;
  }
  .badge-s { color:var(--fire); }
  .badge-c { color:var(--steel-lt); }
  .badge-r { color:var(--ghost); }
  .badge-a { color:var(--green-lt); }

  .sh-name {
    font-family:'Barlow Condensed',sans-serif;
    font-size:1.25rem; font-weight:700;
    text-transform:uppercase; line-height:1;
  }

  .sh-right { text-align:right; flex-shrink:0; }

  .sh-dur {
    font-family:'Barlow Condensed',sans-serif;
    font-size:1.5rem; font-weight:700;
    color:var(--gold); line-height:1;
  }

  .sh-dur-lbl {
    font-size:.52rem; letter-spacing:.1em;
    text-transform:uppercase; color:var(--ghost);
    display:block; margin-top:.1rem;
  }

  /* SECTION LABEL */
  .sec-lbl {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.6rem; letter-spacing:.2em;
    text-transform:uppercase; color:var(--ghost);
    margin:1rem 0 .5rem;
    display:flex; align-items:center; gap:.6rem;
  }
  .sec-lbl::after { content:''; flex:1; height:1px; background:var(--rule); }

  /* EXERCISE CARD */
  .ex-card {
    background:var(--card);
    border:1.5px solid var(--border);
    border-left:3px solid var(--border);
    border-radius:8px; padding:.75rem .9rem;
    margin-bottom:.38rem;
    display:flex; align-items:center; gap:.7rem;
    cursor:pointer; transition:all .15s; user-select:none;
  }
  .ex-card:active { transform:scale(.98); }

  .ex-card.str  { border-left-color:var(--fire); }
  .ex-card.cnd  { border-left-color:var(--steel); }
  .ex-card.acc  { border-left-color:var(--gold); }
  .ex-card.done { border-left-color:var(--green) !important; background:rgba(74,138,90,.06); opacity:.5; }

  .ex-chk {
    width:22px; height:22px; flex-shrink:0;
    border:1.5px solid var(--border2); border-radius:5px;
    background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:.7rem; transition:all .15s;
  }
  .ex-card.done .ex-chk { background:var(--green); border-color:var(--green); color:white; }

  .ex-ico  { font-size:1.15rem; flex-shrink:0; }
  .ex-info { flex:1; min-width:0; }

  .ex-name {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.9rem; font-weight:600;
    text-transform:uppercase; letter-spacing:.02em;
    color:var(--chalk); line-height:1.1;
  }

  .ex-detail {
    font-size:.66rem; color:var(--mid);
    margin-top:.1rem; line-height:1.35;
  }

  .ex-tip {
    font-size:.62rem; color:var(--ghost);
    margin-top:.08rem; font-style:italic; line-height:1.3;
  }

  .ex-scheme {
    font-family:'Barlow Condensed',sans-serif;
    font-size:.95rem; font-weight:600;
    color:var(--gold); text-align:right;
    white-space:nowrap; flex-shrink:0;
  }

  .ex-wt {
    display:flex; align-items:center; gap:.25rem;
    margin-top:.28rem;
  }
  .ex-wt input {
    width:55px; border:none;
    border-bottom:1px solid var(--border2);
    background:transparent;
    font-family:'Barlow Condensed',sans-serif;
    font-size:.8rem; font-weight:600;
    color:var(--chalk); padding:.08rem .2rem;
    text-align:right; outline:none;
    transition:border-color .15s;
  }
  .ex-wt input:focus { border-bottom-color:var(--fire); }
  .ex-wt input::placeholder { color:var(--ghost); font-size:.65rem; font-family:'Barlow',sans-serif; font-weight:300; }
  .ex-wt span { font-size:.58rem; color:var(--ghost); }

  /* REST DAY */
  .rest-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:8px; padding:2.5rem 1.5rem;
    text-align:center; margin-top:.5rem;
  }
  .rest-ico   { font-size:2.5rem; margin-bottom:.75rem; opacity:.45; }
  .rest-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:2rem; font-weight:700;
    text-transform:uppercase; color:var(--ghost);
    letter-spacing:.05em; margin-bottom:.4rem;
  }
  .rest-sub { font-size:.76rem; color:var(--ghost); line-height:1.65; max-width:280px; margin:0 auto; }

  /* SESSION DONE BUTTON */
  .done-btn {
    width:100%; margin-top:1.1rem;
    background:var(--fire); border:none; border-radius:6px;
    color:white; font-family:'Barlow Condensed',sans-serif;
    font-size:1rem; font-weight:700; letter-spacing:.12em;
    text-transform:uppercase; padding:.9rem;
    cursor:pointer; transition:all .15s;
  }
  .done-btn:active { background:var(--fire-lt); transform:scale(.99); }
  .done-btn.completed { background:var(--green); pointer-events:none; }

  /* PROGRESS BAR */
  .prog-wrap {
    background:var(--surface); padding:.5rem 1.25rem .6rem;
    border-bottom:1px solid var(--border);
  }
  .prog-labels { display:flex; justify-content:space-between; font-size:.6rem; color:var(--ghost); margin-bottom:.28rem; }
  .prog-track  { background:var(--border); border-radius:20px; height:5px; overflow:hidden; }
  .prog-fill   { height:100%; border-radius:20px; background:linear-gradient(90deg,var(--fire),var(--fire-lt)); transition:width .4s ease; }

  /* TOAST */
  .toast {
    position:fixed; bottom:5rem; left:50%;
    transform:translateX(-50%) translateY(8px);
    background:var(--fire); color:white;
    font-family:'Barlow Condensed',sans-serif;
    font-size:.82rem; font-weight:600; letter-spacing:.06em;
    padding:.55rem 1.2rem; border-radius:20px;
    opacity:0; transition:all .2s ease;
    pointer-events:none; white-space:nowrap; z-index:200;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.green { background:var(--green); }
  .toast.steel { background:var(--steel); }

  /* BOTTOM NAV */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--bg); border-top:1px solid var(--border);
    display:flex; padding:.4rem 0 .6rem; z-index:100;
  }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:.12rem; background:none; border:none; cursor:pointer; padding:.3rem 0; transition:all .12s; }
  .nav-btn:active { transform:scale(.88); }
  .nav-ico { font-size:1.2rem; }
  .nav-lbl { font-family:'Barlow Condensed',sans-serif; font-size:.55rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--ghost); transition:color .12s; }
  .nav-btn.active .nav-lbl { color:var(--fire); }

  @media (max-width:360px) {
    .phase-tabs { font-size:.6rem; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-kicker">Personal Program · Body Recomposition</div>
  <h1>Alex's<br>Program</h1>
  <span class="h1-sub">Cut fat · Build the upper body · Do the work</span>
  <div class="header-stats">
    <div class="hstat">Sessions: <strong id="hdr-sessions">0</strong></div>
    <div class="hstat">Streak: <strong id="hdr-streak">0</strong> days</div>
    <div class="hstat">Phase: <strong id="hdr-phase">Starter</strong></div>
  </div>
</header>

<!-- PROTEIN TRACKER -->
<div class="protein-wrap">
  <div class="protein-top">
    <span class="protein-label">🥩 Daily Protein Target — 160g</span>
    <span class="protein-val" id="p-val">0 / 160g</span>
  </div>
  <div class="protein-track">
    <div class="protein-fill" id="p-fill" style="width:0%"></div>
  </div>
  <div class="protein-input-row" style="margin-top:.4rem;">
    <input type="number" class="p-input" id="p-input" placeholder="Add grams of protein…" min="0" max="200">
    <button class="p-btn" onclick="addProtein()">+ Add</button>
    <button class="p-reset" onclick="resetProtein()">Reset</button>
  </div>
</div>

<!-- OVERALL PROGRESS -->
<div class="prog-wrap">
  <div class="prog-labels">
    <span>Overall Program Progress</span>
    <span id="prog-label">0 sessions logged</span>
  </div>
  <div class="prog-track">
    <div class="prog-fill" id="prog-fill" style="width:0%"></div>
  </div>
</div>

<!-- PHASE TABS -->
<div class="phase-tabs">
  <button class="phase-tab active" id="ptab-0" onclick="switchPhase(0)">
    <span class="pt-label">Phase 1</span>
    <span class="pt-sub">Starter</span>
  </button>
  <button class="phase-tab" id="ptab-1" onclick="switchPhase(1)">
    <span class="pt-label">Phase 2</span>
    <span class="pt-sub">Build</span>
  </button>
  <button class="phase-tab" id="ptab-2" onclick="switchPhase(2)">
    <span class="pt-label">Phase 3</span>
    <span class="pt-sub">Strength</span>
  </button>
  <button class="phase-tab" id="ptab-3" onclick="switchPhase(3)">
    <span class="pt-label">Phase 4</span>
    <span class="pt-sub">Recomp</span>
  </button>
</div>

<!-- PHASE PANELS -->
<div class="panel active" id="panel-0"></div>
<div class="panel" id="panel-1"></div>
<div class="panel" id="panel-2"></div>
<div class="panel" id="panel-3"></div>

<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-p0" onclick="switchPhase(0)">
    <span class="nav-ico">1️⃣</span><span class="nav-lbl">Starter</span>
  </button>
  <button class="nav-btn" id="nav-p1" onclick="switchPhase(1)">
    <span class="nav-ico">2️⃣</span><span class="nav-lbl">Build</span>
  </button>
  <button class="nav-btn" id="nav-p2" onclick="switchPhase(2)">
    <span class="nav-ico">3️⃣</span><span class="nav-lbl">Strength</span>
  </button>
  <button class="nav-btn" id="nav-p3" onclick="switchPhase(3)">
    <span class="nav-ico">4️⃣</span><span class="nav-lbl">Recomp</span>
  </button>
</div>

<script>
// ─── PROGRAM DEFINITION ───────────────────────────────────────────────────
// Equipment: Barbell (~90lb), EZ curl bar (~90lb), Adjustable KB (45lb),
//            Adjustable bench (flat/incline/decline), Bodyweight
// Goal: Body recomposition — cut fat, build upper chest/shoulders/back
// No planks. Incline push-up progressions instead.

const PHASES = [
  {
    id: 0,
    name: 'Phase 1 — Starter',
    weeks: 'Weeks 1–3',
    desc: 'Three weeks of lower volume to build the habit without destroying yourself. Your body is adapting — soreness is normal, crippling pain is not. Every session should finish with energy left in the tank. This is intentional.',
    goal: 'Goal: Learn the movements, build consistency, wake up muscles that have been sleeping.',
    schedule: [
      // Week 1
      [
        { day:'Mon', type:'strength', name:'Upper Body A', duration:45, exercises:[
          { id:'p1w1m1', cat:'str', ico:'🏋️', name:'Incline Bench Press', detail:'Bench at 45° — upper chest focus. This is your #1 movement.', tip:'Start light. Bar path to upper chest. Full range.', scheme:'3 × 8', weighted:true },
          { id:'p1w1m2', cat:'str', ico:'🏋️', name:'Barbell Row', detail:'Hinge 45°, pull bar to lower chest. Squeeze shoulder blades.', tip:'Keep back flat. No jerking.', scheme:'3 × 8', weighted:true },
          { id:'p1w1m3', cat:'str', ico:'💪', name:'Overhead Press', detail:'Stand or sit, press bar overhead. Tight core.', tip:'Don\'t arch your lower back excessively.', scheme:'3 × 8', weighted:true },
          { id:'p1w1m4', cat:'acc', ico:'🔔', name:'KB Shoulder Press', detail:'One arm at a time. Clean to rack position, press overhead.', tip:'Each arm independently — finds and fixes imbalances.', scheme:'3 × 10 each', weighted:true },
          { id:'p1w1m5', cat:'acc', ico:'📐', name:'Incline Push-Up', detail:'Hands on bench or counter at waist height. Same motion as bench press.', tip:'This is NOT easy — it\'s the starting point. Progress matters more than pride.', scheme:'3 × 10' },
        ]},

const PROTEIN_TARGET = 160;

// ─── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  checkProteinReset();
  buildAllPhases();
  refreshHeader();
  refreshProtein();
  refreshProgress();
  switchPhase(S.currentPhase);
});

// ─── BUILD ─────────────────────────────────────────────────────────────────
function buildAllPhases() {
  PHASES.forEach((phase, pi) => {
    const panel = document.getElementById(`panel-${pi}`);
    if (!panel) return;

    // Phase intro
    let html = `<div class="phase-intro">
      <div class="pi-header">
        <div class="pi-title">${phase.name}</div>
        <div class="pi-weeks">${phase.weeks}</div>
      </div>
      <div class="pi-desc">${phase.desc}</div>
      <div class="pi-goal">🎯 ${phase.goal}</div>
    </div>
    <div class="main" id="main-${pi}">`;

    // Weeks
    phase.schedule.forEach((week, wi) => {
      html += `<div class="wk-label">Week ${wi + 1}</div>`;

      // Day scroll
      html += `<div class="day-scroll" id="dscroll-${pi}-${wi}">`;
      week.forEach((session, di) => {
        const key = `${pi}-${wi}-${di}`;
        const isDone = !!S.sessions[key];
        const typeColor = session.type === 'strength' ? 'var(--fire)' :
                          session.type === 'cardio'   ? 'var(--steel-lt)' :
                          session.type === 'active'   ? 'var(--green-lt)' : 'var(--ghost)';
        html += `<div class="day-btn${isDone?' done':''} ${session.type === 'rest' ? 'rest-day' : ''}"
          id="db-${pi}-${wi}-${di}"
          onclick="${session.type !== 'rest' ? `showDay(${pi},${wi},${di})` : ''}">
          <span class="db-name" style="color:${session.type === 'rest' ? 'var(--ghost)' : ''}">${session.day}</span>
          <span class="db-type">${session.type === 'rest' ? '—' : session.name.split(' ').slice(0,2).join(' ')}</span>
          <span class="db-tick">${isDone ? '✓' : ''}</span>
        </div>`;
      });
      html += '</div>';

      // Day views
      week.forEach((session, di) => {
        html += `<div class="day-view" id="dv-${pi}-${wi}-${di}">`;

        if (session.type === 'rest') {
          html += `<div class="rest-card">
            <div class="rest-ico">😴</div>
            <div class="rest-title">Rest Day</div>
            <div class="rest-sub">Muscle is built during recovery, not during the session. Eat your protein. Sleep well. Come back tomorrow.</div>
          </div>`;
        } else {
          const key = `${pi}-${wi}-${di}`;
          const isDone = !!S.sessions[key];
          const typeBadge = session.type === 'strength' ? 'badge-s' :
                            session.type === 'cardio'   ? 'badge-c' :
                            session.type === 'active'   ? 'badge-a' : 'badge-r';
          const typeLabel = session.type === 'strength' ? 'Strength' :
                            session.type === 'cardio'   ? 'Conditioning' :
                            session.type === 'active'   ? 'Active Recovery' : 'Rest';

          html += `<div class="session-hdr">
            <div>
              <div class="sh-badge ${typeBadge}">${typeLabel}</div>
              <div class="sh-name">${session.name}</div>
            </div>
            <div class="sh-right">
              <div class="sh-dur">${session.duration || '—'}</div>
              <span class="sh-dur-lbl">minutes</span>
            </div>
          </div>`;

          // Group exercises by category
          const warmup = session.type !== 'rest' ? [{
            id: `wu-${pi}-${wi}-${di}`,
            cat: 'wu', ico: '🔥',
            name: 'Warm-Up',
            detail: '5–8 min of light movement. Arm circles, leg swings, hip rotations, 2 sets of very light weight on your first lift.',
            tip: 'Never skip this. Cold muscles tear.',
            scheme: '5–8 min',
            weighted: false,
            isWarmup: true,
          }] : [];

          const allEx = [...warmup, ...session.exercises];

          if (warmup.length) {
            html += `<div class="sec-lbl">Warm-Up</div>`;
            html += buildExCard(pi, wi, di, warmup[0]);
          }

          if (session.type === 'strength') {
            const main = session.exercises.filter(e => e.cat === 'str');
            const acc  = session.exercises.filter(e => e.cat === 'acc');
            if (main.length) {
              html += `<div class="sec-lbl">Main Lifts — Rest 2–3 min between sets</div>`;
              main.forEach(e => { html += buildExCard(pi, wi, di, e); });
            }
            if (acc.length) {
              html += `<div class="sec-lbl">Accessory Work — Rest 90s</div>`;
              acc.forEach(e => { html += buildExCard(pi, wi, di, e); });
            }
          } else {
            html += `<div class="sec-lbl">Session Work</div>`;
            session.exercises.forEach(e => { html += buildExCard(pi, wi, di, e); });
          }

          html += `<button class="done-btn${isDone?' completed':''}"
            id="donebtn-${pi}-${wi}-${di}"
            onclick="completeSession(${pi},${wi},${di})"
            ${isDone ? 'disabled' : ''}>
            ${isDone ? '✓ Session Complete' : 'Mark Session Complete →'}
          </button>`;
        }

        html += '</div>'; // end day-view
      });
    });

    html += '</div>'; // end main
    panel.innerHTML = html;

    // Restore check states
    PHASES[pi].schedule.forEach((week, wi) => {
      week.forEach((session, di) => {
        session.exercises.forEach(ex => {
          if (S.done[ex.id]) {
            const card = document.getElementById(`ec-${ex.id}`);
            const chk  = document.getElementById(`ck-${ex.id}`);
            if (card) card.classList.add('done');
            if (chk)  chk.textContent = '✓';
          }
          if (S.weights[ex.id]) {
            const inp = document.getElementById(`wt-${ex.id}`);
            if (inp) inp.value = S.weights[ex.id];
          }
        });
      });
    });
  });
}

function buildExCard(pi, wi, di, ex) {
  const isDone = !!S.done[ex.id];
  const wtVal  = S.weights[ex.id] || '';
  const catClass = ex.cat === 'str' ? 'str' : ex.cat === 'cnd' ? 'cnd' : ex.cat === 'acc' ? 'acc' : '';
  const onclick = ex.isWarmup ? '' : `onclick="toggleEx('${ex.id}')"`;

  return `<div class="ex-card ${catClass}${isDone?' done':''}" id="ec-${ex.id}" ${onclick}>
    <div class="ex-chk" id="ck-${ex.id}">${isDone ? '✓' : ''}</div>
    <div class="ex-ico">${ex.ico}</div>
    <div class="ex-info">
      <div class="ex-name">${ex.name}</div>
      ${ex.detail ? `<div class="ex-detail">${ex.detail}</div>` : ''}
      ${ex.tip    ? `<div class="ex-tip">${ex.tip}</div>` : ''}
      ${ex.weighted ? `<div class="ex-wt">
        <input type="number" id="wt-${ex.id}" placeholder="lbs" step="5" value="${wtVal}"
          onclick="event.stopPropagation()"
          oninput="saveWeight('${ex.id}',this.value)">
        <span>lbs</span>
      </div>` : ''}
    </div>
    <div class="ex-scheme">${ex.scheme}</div>
  </div>`;
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────
let curPhase = 0;
let curDay   = {};  // 'pi-wi' -> di

function switchPhase(pi) {
  curPhase = pi;
  S.currentPhase = pi;
  saveState();
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${pi}`).classList.add('active');
  document.getElementById(`ptab-${pi}`).classList.add('active');
  document.getElementById(`nav-p${pi}`).classList.add('active');
  refreshHeader();
}

function showDay(pi, wi, di) {
  const key = `${pi}-${wi}`;
  curDay[key] = di;

  // Hide all day views in this week
  PHASES[pi].schedule[wi].forEach((s, d) => {
    const dv = document.getElementById(`dv-${pi}-${wi}-${d}`);
    const db = document.getElementById(`db-${pi}-${wi}-${d}`);
    if (dv) dv.classList.remove('active');
    if (db) { db.classList.remove('active'); }
  });

  const dv = document.getElementById(`dv-${pi}-${wi}-${di}`);
  const db = document.getElementById(`db-${pi}-${wi}-${di}`);
  if (dv) dv.classList.add('active');
  if (db) { db.classList.add('active'); }

  // Scroll into view
  setTimeout(() => db?.scrollIntoView({ inline:'center', behavior:'smooth' }), 100);
}

// ─── INTERACTIONS ───────────────────────────────────────────────────────────
function toggleEx(id) {
  S.done[id] = !S.done[id];
  const card = document.getElementById(`ec-${id}`);
  const chk  = document.getElementById(`ck-${id}`);
  if (card) card.classList.toggle('done', S.done[id]);
  if (chk)  chk.textContent = S.done[id] ? '✓' : '';
  saveState();
  if (S.done[id]) toast('✓ Done');
}

function saveWeight(id, val) {
  if (val) S.weights[id] = val;
  else delete S.weights[id];
  saveState();
}

function completeSession(pi, wi, di) {
  const key  = `${pi}-${wi}-${di}`;
  S.sessions[key] = true;

  // Stats
  S.totalSessions++;
  const today = new Date().toISOString().split('T')[0];
  if (S.lastSessionDate) {
    const last = new Date(S.lastSessionDate);
    const now  = new Date(today);
    const diff = Math.round((now - last) / 86400000);
    S.streak = diff <= 2 ? S.streak + 1 : 1;
  } else {
    S.streak = 1;
  }
  S.lastSessionDate = today;

  // Update UI
  const btn = document.getElementById(`donebtn-${pi}-${wi}-${di}`);
  const db  = document.getElementById(`db-${pi}-${wi}-${di}`);
  if (btn) { btn.textContent = '✓ Session Complete'; btn.classList.add('completed'); btn.disabled = true; }
  if (db)  { db.classList.remove('active'); db.classList.add('done'); db.querySelector('.db-tick').textContent = '✓'; }

  saveState();
  refreshHeader();
  refreshProgress();
  toast('Session logged! 💪', 'green');
}

// ─── PROTEIN ────────────────────────────────────────────────────────────────
function checkProteinReset() {
  const today = new Date().toISOString().split('T')[0];
  if (S.proteinDate !== today) { S.protein = 0; S.proteinDate = today; saveState(); }
}

function addProtein() {
  const inp = document.getElementById('p-input');
  const val = parseInt(inp.value);
  if (!val || val <= 0) return;
  S.protein += val;
  inp.value = '';
  saveState();
  refreshProtein();
  if (S.protein >= PROTEIN_TARGET) toast('Protein target hit! 💪', 'steel');
  else toast(`+${val}g protein added`);
}

function resetProtein() {
  S.protein = 0;
  S.proteinDate = new Date().toISOString().split('T')[0];
  saveState();
  refreshProtein();
}

function refreshProtein() {
  const pct = Math.min(100, Math.round(S.protein / PROTEIN_TARGET * 100));
  document.getElementById('p-fill').style.width = pct + '%';
  document.getElementById('p-val').textContent  = `${S.protein} / ${PROTEIN_TARGET}g`;
}

// ─── REFRESH ────────────────────────────────────────────────────────────────
function refreshHeader() {
  const phaseNames = ['Starter','Build','Strength','Recomp'];
  document.getElementById('hdr-sessions').textContent = S.totalSessions;
  document.getElementById('hdr-streak').textContent   = S.streak;
  document.getElementById('hdr-phase').textContent    = phaseNames[curPhase] || 'Starter';
}

function refreshProgress() {
  // Count total non-rest sessions across all phases
  let total = 0, done = 0;
  PHASES.forEach((phase, pi) => {
    phase.schedule.forEach((week, wi) => {
      week.forEach((session, di) => {
        if (session.type !== 'rest') {
          total++;
          if (S.sessions[`${pi}-${wi}-${di}`]) done++;
        }
      });
    });
  });
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-fill').style.width  = pct + '%';
  document.getElementById('prog-label').textContent = `${done} of ${total} sessions logged`;
}

// ─── STORAGE ────────────────────────────────────────────────────────────────
function saveState() {
  try { localStorage.setItem('alex_program', JSON.stringify(S)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('alex_program');
    if (raw) {
      const l = JSON.parse(raw);
      S = {
        currentPhase:    l.currentPhase    || 0,
        done:            l.done            || {},
        sessions:        l.sessions        || {},
        weights:         l.weights         || {},
        protein:         l.protein         || 0,
        proteinDate:     l.proteinDate     || '',
        totalSessions:   l.totalSessions   || 0,
        lastSessionDate: l.lastSessionDate || '',
        streak:          l.streak          || 0,
      };
    }
  } catch(e) {}
}

// ─── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast${type?' '+type:''} show`;
  setTimeout(() => el.classList.remove('show'), 2300);
}
</script>
</body>
</html>
